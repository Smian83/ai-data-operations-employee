[alembic]
script_location = alembic
prepend_sys_path = ../backend
version_path_separator = os
# sqlalchemy.url is intentionally omitted here — it is injected at runtime
# from Settings.database_url inside alembic/env.py, so a single source of
# truth (the .env file) drives both the app and migrations.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
